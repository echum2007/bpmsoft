          - generic [ref=e103]:
            - paragraph [ref=e104]: "BPMSoft позволяет создавать решения для разных бизнес-задач с разной степенью кастомизации. Однако, нужно помнить, что система состоит из двух уровней: ядра и конфигурации. Ядро — это фиксированный компонент системы, который не подлежит изменению. Конфигурация — это уровень, на котором происходит разработка в системе."
            - paragraph [ref=e105]: На уровне конфигурации можно кастомизировать приложения на стороне back-end. Это означает, что можно работать с данными, веб-сервисами, бизнес-логикой объектов и так далее.
            - paragraph [ref=e106]: BPMSoft предлагает разные инструменты для этого. Например, можно разрабатывать схему «Исходный код» или «Действие процесса» во встроенной IDE. Также можно создавать готовые пользовательские проекты, которые подключаются к приложению как внешние библиотеки.
            - heading "Области, входящие в back-end разработку" [level=2] [ref=e107]:
              - text: Области, входящие в back-end разработку
              - img [ref=e109] [cursor=pointer]
            - paragraph [ref=e111]: Back-end разработка — это создание и настройка приложений на стороне сервера. Эти процессы включают работу с данными, веб-сервисами, интеграцией с другими сервисами, компонентами системы, микросервисами, бизнес-процессами и бизнес-логикой объектов.
            - paragraph [ref=e112]: "В системе есть несколько направлений back-end разработки, которые можно использовать для решения разных задач:"
            - list [ref=e113]:
              - listitem [ref=e114]: • ORM-модель данных и методы работы с ней;
              - listitem [ref=e115]: • Реализация прямого доступа к базе данных;
              - listitem [ref=e116]: • Создание и использование системных веб-сервисов;
              - listitem [ref=e117]: • Настройка интеграции с внешними сервисами;
              - listitem [ref=e118]: • Работа с компонентами системы и микросервисами;
              - listitem [ref=e119]: • Расширенная настройка бизнес-процессов и встроенных процессов объектов приложения;
              - listitem [ref=e120]: • Разработка бизнес-логики объектов.
            - heading "Работа с данными через ORM-модель и с помощью прямого доступа" [level=2] [ref=e121]:
              - text: Работа с данными через ORM-модель и с помощью прямого доступа
              - img [ref=e123] [cursor=pointer]
            - paragraph [ref=e125]: "Данные в BPMSoft хранятся в базе данных, к которой можно обращаться разными способами. В зависимости от вашей задачи, вы можете выбрать один из двух подходов: ORM-модель данных или прямой доступ к базе данных."
            - paragraph [ref=e126]: ORM-модель данных — это способ представления таблиц базы данных в виде классов и объектов. Такой подход упрощает работу с данными, так как вы не нуждаетесь в знании SQL-синтаксиса. Вы можете использовать ORM-модель данных для выборки, добавления, изменения и удаления записей в базе данных с учетом прав доступа текущего пользователя.
            - paragraph [ref=e127]:
              - text: "Подробнее о работе с данными через ORM-модель читайте в статье:"
              - link "Доступ к данным через ORM" [ref=e128] [cursor=pointer]:
                - /url: /baza-znaniy/operatsii-s-dannymi-back-end/dostup-k-dannym-cherez-orm/
            - paragraph [ref=e129]: "Для работы с ORM-моделью данных в системе есть специальные классы из пространства имен BPMSoft.Core.Entities:"
            - list [ref=e130]:
              - listitem [ref=e131]:
                - text: "• BPMSoft.Core.Entities.EntitySchemaQuery — класс для построения запросов выборки записей из таблиц базы данных. Позволяет указывать разные параметры запроса, такие как фильтры, сортировки, группировки, агрегатные функции и т. д. Подробнее о классе EntitySchemaQuery в статье:"
                - link "Класс EntitySchemaQuery" [ref=e132] [cursor=pointer]:
                  - /url: /baza-znaniy/dannye/klass-entityschemaquery/
                - text: ;
              - listitem [ref=e133]:
                - text: "• BPMSoft.Core.Entities.Entity — класс для доступа к объекту, который представляет собой запись в таблице базы данных. Позволяет получать и устанавливать значения полей объекта, а также вызывать методы для добавления, изменения или удаления объекта в базе данных. Подробнее о классе Entity в статье:"
                - link "Класс Entity" [ref=e134] [cursor=pointer]:
                  - /url: /baza-znaniy/operatsii-s-dannymi-back-end/klass-entity/
                - text: .
            - paragraph [ref=e135]: Прямой доступ к базе данных — это способ обращения к данным с помощью SQL-запросов. Прямой доступ игнорирует права доступа к таблицам базы данных, а также не дает возможности работать с кэшем. Вы можете использовать прямой доступ к базе данных для выполнения сложных запросов, которые не поддерживаются ORM-моделью данных.
            - paragraph [ref=e136]:
              - text: "Подробнее о работе с данными используя прямой доступ смотрите в статье:"
              - link "Прямой доступ к данным" [ref=e137] [cursor=pointer]:
                - /url: /baza-znaniy/operatsii-s-dannymi-back-end/pryamoy-dostup-k-dannym/
              - text: .
            - paragraph [ref=e138]: "Для работы с прямым доступом к базе данных в системе существуют специальные классы из пространства имен BPMSoft.Core.DB:"
            - list [ref=e139]:
              - listitem [ref=e140]: • BPMSoft.Core.DB.Select — класс для построения запросов выборки записей из таблиц базы данных. Позволяет указывать разные параметры запроса, такие как столбцы, условия, соединения, подзапросы и т. д;
              - listitem [ref=e141]: • BPMSoft.Core.DB.Insert — класс для построения запросов на добавление записей в таблицы базы данных. Позволяет указывать значения полей для добавляемых записей;
              - listitem [ref=e142]: • BPMSoft.Core.DB.InsertSelect — класс для построения запросов на добавление записей в таблицы базы данных на основе других запросов выборки;
              - listitem [ref=e143]: • BPMSoft.Core.DB.Update — класс для построения запросов на изменение записей в таблице базы данных. Позволяет указывать новые значения полей для изменяемых записей и условия для выборки записей;
              - listitem [ref=e144]: • BPMSoft.Core.DB.Delete — класс для построения запросов на удаление записей в таблице базы данных. Позволяет указывать условия для выборки удаляемых записей;
              - listitem [ref=e145]: • BPMSoft.Core.DB.DBExecutor — класс для выполнения запросов к базе данных. Позволяет передавать SQL-строку или экземпляр любого из вышеуказанных классов для выполнения запроса.
            - paragraph [ref=e146]: Выбирайте подход к работе с данными в зависимости от вашей задачи и предпочтений. Рекомендованным способом работы с данными является взаимодействие через ORM-модель.
            - heading "Веб-сервисы" [level=2] [ref=e147]:
              - text: Веб-сервисы
              - img [ref=e149] [cursor=pointer]
            - paragraph [ref=e151]: Веб-сервис — это способ обмена данными между разными приложениями и системами по сети. Система предлагает несколько вариантов веб-сервисов для разных целей интеграции.
            - paragraph [ref=e152]: Системные веб-сервисы — это веб-сервисы, которые предоставляют базовую функциональность BPMSoft для внешних приложений и систем. Вы можете использовать системные веб-сервисы для обмена данными, запуска бизнес-процессов, авторизации и т. д.
            - paragraph [ref=e153]: "Например, вы можете использовать следующие системные веб-сервисы:"
            - list [ref=e154]:
              - listitem [ref=e155]:
                - text: "• OData — веб-сервис для обмена данными по протоколу OData 4. Вы можете получать и отправлять данные из таблиц базы данных системы с помощью стандартных HTTP-запросов. Для подробной информации о протоколе OData 4 смотрите статью:"
                - link "OData" [ref=e156] [cursor=pointer]:
                  - /url: /baza-znaniy/odata/odata/
                - text: ;
              - listitem [ref=e157]:
                - text: "• ProcessEngineService.svc — веб-сервис для запуска бизнес-процессов системы из внешних приложений. Вы можете передавать параметры для запуска бизнес-процесса и получать результат его выполнения. Для подробной информации о работе с бизнес-процессами, смотрите статью:"
                - link "Веб-сервис ProcessEngineService.svc" [ref=e158] [cursor=pointer]:
                  - /url: /baza-znaniy/servis-zapuska-biznes-protsessov/zapustit-biznes-protsess-cherez-veb-servis-processengineservice/
                - text: .
            - paragraph [ref=e159]:
              - text: "Пользовательские веб-сервисы — это веб-сервисы, которые создаются и настраиваются вне системы для решения узких бизнес-задач конкретного проекта. Вы можете использовать пользовательские веб-сервисы для интеграции с другими приложениями и системами, которые не поддерживаются стандартными инструментами системы. Для вызова такого веб-сервиса можно использовать как ссылку в браузере, так и обращения из front-end модуля. Подробнее смотрите в статье:"
              - link "Пользовательские веб-сервисы" [ref=e160] [cursor=pointer]:
                - /url: /baza-znaniy/veb-servisy-servernaya-razrabotka/veb-servisy/
              - text: .
            - heading "Компоненты системы и микросервисы" [level=2] [ref=e161]:
              - text: Компоненты системы и микросервисы
              - img [ref=e163] [cursor=pointer]
            - paragraph [ref=e165]:
              - text: Приложение BPMSoft имеет ядро, в котором находятся классы для работы с разными частями системы и микросервисами. Одна из таких частей — это пространство имен BPMSoft.Sync, которое отвечает за встроенный механизм синхронизации с другими системами хранения данных (
              - link "Sync Engine" [ref=e166] [cursor=pointer]:
                - /url: /baza-znaniy/mekhanizm-sinkhronizatsii-sync-engine/obshchie-printsipy-raboty-mekhanizma-sinkhronizatsii-sync-engine/
              - text: ). Этот механизм позволяет создавать, изменять и удалять Entity в системе, используя данные из других систем, а также экспортировать данные из системы в другие системы. Для выполнения процесса синхронизации нужно использовать класс SyncAgent. В качестве еще одного примера, пространство имен
              - link "BPMSoft.Social" [ref=e167] [cursor=pointer]:
                - /url: /baza-znaniy/article-in-progress/
              - text: предоставляет возможность интеграции с различными социальными сетями.
            - heading "Бизнес-процессы и встроенные процессы объектов" [level=2] [ref=e168]:
              - text: Бизнес-процессы и встроенные процессы объектов
              - img [ref=e170] [cursor=pointer]
            - paragraph [ref=e172]: BPMSoft позволяет создавать и настраивать различные бизнес-процессы, которые определяют логику работы с объектами и данными в системе. Бизнес-процессы могут быть настроены как с помощью no-code инструментов, так и с использованием back-end разработки. Back-end разработка может быть необходима для реализации сложных бизнес-процессов, которые требуют выполнения пользовательских скриптов (Элемент процесса «Задание-сценарий») или для создания пользовательских действий процесса, которые выполняются повторно в разных ситуациях (Конфигурационная схема «Действие процесса»).
            - paragraph [ref=e173]:
              - text: "Подробнее смотрите в статье:"
              - link "Добавление бизнес-процесса" [ref=e174] [cursor=pointer]:
                - /url: /baza-znaniy/nachalo-raboty-s-biznes-protsessami/dizayner-protsessov/
              - text: .
            - paragraph [ref=e175]: Встроенные процессы объекта — это специальные бизнес-процессы, которые связаны с определенным объектом и запускаются при наступлении определенных событий, связанных с этим объектом. Например, при создании, изменении или удалении объекта. Встроенные процессы объекта также могут быть настроены как с помощью no-code инструментов, так и с использованием back-end разработки. Программный код позволяет более гибко настроить поведение объекта в зависимости от условий и параметров события.
            - heading "Бизнес-логика объектов" [level=2] [ref=e176]:
              - text: Бизнес-логика объектов
              - img [ref=e178] [cursor=pointer]
            - paragraph [ref=e180]: BPMSoft предоставляет возможность создавать бизнес-логику объектов, которая выполняется при наступлении определенных событий, связанных с объектом, без необходимости создавать событийные подпроцессы. Для этого нужно создать класс, который наследуется от базового ядрового класса BPMSoft.Core.Entities.Events.BaseEntityEventListener и пометить его атрибутом EntityEventListener, в котором указать имя объекта, для которого нужно подписаться на события. Затем можно переопределить методы, которые обрабатывают нужные события. Например, метод «OnSaving», который вызывается перед сохранением объекта в базе данных.
            - paragraph [ref=e181]:
              - text: "Подробнее смотрите в статье:"
              - link "Бизнес-логика объектов" [ref=e182] [cursor=pointer]:
                - /url: /baza-znaniy/sobytiynyy-sloy/vozmozhnosti-sobytijnogo-sloya/
              - text: .
            - heading "Инструменты и утилитные возможности back-end разработки" [level=2] [ref=e183]:
              - text: Инструменты и утилитные возможности back-end разработки
              - img [ref=e185] [cursor=pointer]
            - heading "Схема типа «Исходный код»" [level=3] [ref=e187]:
              - text: Схема типа «Исходный код»
              - img [ref=e189] [cursor=pointer]
            - paragraph [ref=e191]: BPMSoft предоставляет различные инструменты и утилитные возможности для back-end разработки, которые позволяют создавать и настраивать схемы, классы, методы и другие элементы системы. Одним из таких инструментов является схема типа «Исходный код», которая позволяет писать программный код на C#.
            - paragraph
            - emphasis [ref=e193]:
              - strong [ref=e194]: Примечание.
              - text: Наименования пользовательских классов не должны совпадать с наименованиями базовых. Совпадение наименований классов может возникнуть и при переходе на более новую версию, так как в ней могут появиться новые классы, совпадающие по названию с пользовательскими. Совпадение наименований может привести к ошибкам, например, при компиляции системы. При возникновении ошибок рекомендуется переименовать пользовательский класс и выполнить перекомпиляцию.
            - paragraph
            - paragraph [ref=e195]: Схема типа «Исходный код» создается в пользовательском пакете, который является контейнером для хранения пользовательских элементов системы. Пользовательский пакет можно создать и настроить в дизайнере системы, который является графическим интерфейсом для работы с элементами системы. Дизайнер системы позволяет создавать, изменять и удалять схемы, а также просматривать и редактировать их свойства и метаданные.
            - paragraph [ref=e196]: В дизайнере системы можно редактировать код схемы типа «Исходный код» в специальном окне редактора кода, которое поддерживает подсветку синтаксиса, автозаполнение и другие функции. Все изменения кода, которые делаются в редакторе кода, сохраняются в оперативной памяти. Чтобы изменения были сохранены на уровне метаданных схемы, нужно нажать кнопку Сохранить. Чтобы изменения были применены на уровне базы данных, нужно нажать кнопку Опубликовать.
            - paragraph [ref=e197]:
              - text: "Подробнее о работе со схемой типа «Исходный код» смотрите в статье:"
              - link "Разработка конфигурационных элементов" [ref=e198] [cursor=pointer]:
                - /url: /baza-znaniy/vstroennye-instrumenty/razrabotka-konfiguratsionnykh-elementov/
              - text: .
            - paragraph [ref=e199]:
              - text: "Кроме того, схему типа «Исходный код» можно разрабатывать в файловой системе, используя любую удобную среду разработки (IDE), такую как Visual Studio, Visual Studio Code, Sublime Text и другие. Для этого нужно экспортировать пользовательский пакет из дизайнера системы в файловую систему, где он будет представлен в виде папки с файлами. В этих файлах можно редактировать код схемы типа «Исходный код» и других элементов системы. После редактирования кода нужно импортировать пользовательский пакет обратно в дизайнер системы и опубликовать его. Подробнее смотрите в статье:"
              - link "Внешние IDE" [ref=e200] [cursor=pointer]:
                - /url: /baza-znaniy/storonnie-intsurmenty/vneshnie-ide/
              - text: .
            - heading "Конфигурирование бизнес-процессов" [level=3] [ref=e201]:
              - text: Конфигурирование бизнес-процессов
              - img [ref=e203] [cursor=pointer]
            - paragraph [ref=e205]: «Задание-сценарий» позволяет вставить в бизнес-процесс back-end логику на языке программирования. Это нужно для сложных операций, которые не могут быть выполнены стандартными элементами процесса.
            - paragraph [ref=e206]: "У данного элемента есть особенности использования:"
            - list [ref=e207]:
              - listitem [ref=e208]: • Код нельзя легко переиспользовать в других процессах или элементах;
              - listitem [ref=e209]: • Могут возникнуть трудности с поддержкой и изменением кода, особенно если он большой или не документирован;
              - listitem [ref=e210]: • Код может быть недоступен или непонятен для других пользователей системы, которые не знают языка программирования;
            - paragraph [ref=e211]: Для решения этих проблем можно использовать другой способ вставки back-end логики в бизнес-процесс — пользовательские действия.
            - paragraph [ref=e212]: Пользовательское действие — это тип действия, который можно выбрать для элемента «Выполнить действие процесса». Этот элемент позволяет выполнять однотипные операции в бизнес-процессах, такие как отправка сообщений, создание документов, запуск таймеров и другие.
            - paragraph [ref=e213]: "Пользовательское действие состоит из двух частей:"
            - list [ref=e214]:
              - listitem [ref=e215]:
                - text: • Конфигурационная схема «Действие процесса».
                - text: Это схема, которая определяет название, описание, параметры и логику пользовательского действия. Она создается один раз и может быть использована в любом количестве процессов и элементов.
              - listitem [ref=e216]:
                - text: • Экземпляр пользовательского действия.
                - text: Это конкретное использование пользовательского действия в элементе «Выполнить действие процесса». Он наследует название, описание и логику из конфигурационной схемы, но может иметь свои значения параметров, которые задаются при настройке элемента.
            - paragraph [ref=e217]: "Преимущества использования пользовательских действий в бизнес-процессах:"
            - list [ref=e218]:
              - listitem [ref=e219]: • Пользовательское действие можно создать один раз и использовать много раз в разных процессах и элементах, что упрощает разработку и повышает эффективность;
              - listitem [ref=e220]: • Пользовательское действие можно легко изменять и обновлять, при этом все экземпляры пользовательского действия автоматически получат новую версию логики, что улучшает поддержку и согласованность;
              - listitem [ref=e221]: • Пользовательское действие можно сделать доступным и понятным для других пользователей системы, добавив название, описание и параметры, которые объясняют, что делает действие и как его использовать;
            - paragraph [ref=e222]:
              - text: "Подробнее об элементах «Задание сценарий» и «Пользовательское действие» читайте в статье:"
              - link "Разработка конфигурационных элементов" [ref=e223] [cursor=pointer]:
                - /url: /baza-znaniy/vstroennye-instrumenty/razrabotka-konfiguratsionnykh-elementov/
              - text: .
            - heading "Внешние библиотеки" [level=3] [ref=e224]:
              - text: Внешние библиотеки
              - img [ref=e226] [cursor=pointer]
            - paragraph [ref=e228]: Внешние библиотеки — это сборки, которые содержат пользовательский код, написанный на языке C#. Внешние библиотеки могут быть добавлены в структуру пользовательского пакета, который является единицей распространения и установки функциональности в системе. Внешние библиотеки позволяют реализовать сложную логику, механизмы наследования, инкапсуляции при разработке специфического проектного решения.
            - heading "Пакеты-проекты" [level=3] [ref=e229]:
              - text: Пакеты-проекты
              - img [ref=e231] [cursor=pointer]
            - paragraph [ref=e233]: Пакеты-проекты — это особый тип пакетов, который позволяет разрабатывать функциональность как обычный C#-проект. Пакет-проект содержит не только скомпилированную библиотеку, но и исходные файлы с расширением .cs. Это упрощает процесс отладки и тестирования функциональности.
            - paragraph [ref=e234]:
              - text: "Подробнее смотрите в статье:"
              - link "Пакет-проект" [ref=e235] [cursor=pointer]:
                - /url: /baza-znaniy/rabota-s-paketami/paket-proekt/
              - text: .
