                - text: • createCompareFilter(comparisonType, leftExpression, rightExpression);
                - text: Создает новый COMPARE фильтр для сравнения значений. Экземпляр класса «BPMSoft.CompareFilter».
                - text: Возвращает созданный фильтр.
            - paragraph [ref=e153] [cursor=pointer]: Таблица 14 — Описание параметров метода «createCompareFilter»
            - text: • • • • • • • • • • • • • • • •
            - list [ref=e154]:
              - listitem [ref=e155]:
                - text: • createExistsFilter(columnPath);
                - text: Создает новый Exists фильтр, в качества выражения берет значение колонки и проверяет его существование. Экземпляр класса «BPMSoft.IsNullFilter».
                - text: Возвращает созданный фильтр.
            - paragraph [ref=e156] [cursor=pointer]: Таблица 15 — Описание параметров метода «createExistsFilter»
            - list [ref=e157]:
              - listitem [ref=e158]:
                - text: • createNotExistsFilter(columnPath);
                - text: Создает новый Exists фильтр, в качества выражения берет значение колонки и проверяет его отсутствие. Экземпляр класса «BPMSoft.ExistsFilter».
                - text: Возвращает созданный фильтр.
            - paragraph [ref=e159] [cursor=pointer]: Таблица 16 — Описание параметров метода «createNotExistsFilter»
            - list [ref=e160]:
