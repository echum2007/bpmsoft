            - list [ref=e110]:
              - listitem [ref=e111]:
                - text: • abortQuery();
                - text: Останавливает выполнение запроса.
            - list [ref=e112]:
              - listitem [ref=e113]:
                - text: • addAggregationSchemaColumn(columnPath, aggregationType, [columnAlias], aggregationEvalType);
                - text: Создает новую колонку-функцию, экземпляр класса «BPMSoft.FunctionQueryColumn» с типом AGGREGATION. После чего добавляет ее в экземпляр запроса, из которого был вызван метод.
            - paragraph [ref=e114] [cursor=pointer]: Таблица 1 — Описание параметров метода «addAggregationSchemaColumn»
            - text: • • • • • • • • •
            - list [ref=e115]:
              - listitem [ref=e116]:
                - text: • addColumn(column, [columnAlias], [config]);
                - text: Создаёт новую колонку, экземпляр «BPMSoft.EntityQueryColumn», после чего добавляет ее в экземпляр запроса, из которого был вызван метод.
            - paragraph [ref=e117] [cursor=pointer]: Таблица 2 — Описание параметров метода «addColumn»
            - list [ref=e118]:
              - listitem [ref=e119]:
                - text: • addDatePartFunctionColumn(columnPath, datePartType, [columnAlias]);
                - text: Создает новую колонку-функцию, экземпляр класса «BPMSoft.FunctionQueryColumn» с типом DATE_PART. После чего добавляет ее в экземпляр запроса, из которого был вызван метод.
            - paragraph [ref=e120] [cursor=pointer]: Таблица 3 — Описание параметров метода «addDatePartFunctionColumn»
            - text: • • • • • • • •
            - list [ref=e121]:
              - listitem [ref=e122]:
                - text: • addDatePeriodMacrosColumn(macrosType, [macrosValue], [columnAlias]);
                - text: Создает новую колонку-функцию, экземпляр класса «BPMSoft.FunctionQueryColumn» с типом MACROS, для типов макроса (даты), требующих параметризации. После чего добавляет ее в экземпляр запроса, из которого был вызван метод.
            - paragraph [ref=e123] [cursor=pointer]: Таблица 4 — Описание параметров метода «addDatePeriodMacrosColumn»
            - text: • • • • • • •
            - list [ref=e124]:
              - listitem [ref=e125]:
                - text: • addFunctionColumn(columnPath, functionType, [columnAlias]);
                - text: Создаёт колонку-функцию экземпляр класса «BPMSoft.FunctionQueryColumn», после чего добавляет еe в экземпляр запроса, из которого был вызван метод.
            - paragraph [ref=e126] [cursor=pointer]: Таблица 5 — Описание параметров метода «addFunctionColumn»
            - text: • • • • • • • •
            - list [ref=e127]:
              - listitem [ref=e128]:
                - text: • addMacrosColumn(macrosType, [columnAlias]);
                - text: Создает новую колонку-функцию, экземпляр класса «BPMSoft.FunctionQueryColumn» с типом MACROS. Не требует параметризации. После чего добавляет ее в экземпляр запроса, из которого был вызван метод.
            - paragraph [ref=e129] [cursor=pointer]: Таблица 6 — Описание параметров метода «addMacrosColumn»
            - text: • • • • • • • • • • • • • • • • • • • • • • • • • • • •
            - list [ref=e130]:
              - listitem [ref=e131]:
                - text: • addParameterColumn(paramValue, paramDataType, [columnAlias]);
                - text: Создает новую колонку-параметр, экземпляр класса «BPMSoft.ParameterQueryColumn». После чего добавляет ее в экземпляр запроса, из которого был вызван метод.
            - paragraph [ref=e132] [cursor=pointer]: Таблица 7 — Описание параметров метода «addParameterColumn»
            - list [ref=e133]:
              - listitem [ref=e134]:
                - text: • createBetweenFilter(leftExpression, rightLessExpression, rightGreaterExpression);
                - text: Создает новый BETWEEN фильтр, экземпляр класса «BPMSoft.BetweenFilter».
                - text: Возвращает созданный фильтр.
            - paragraph [ref=e135] [cursor=pointer]: Таблица 8 — Описание параметров метода «createBetweenFilter»
            - list [ref=e136]:
              - listitem [ref=e137]:
                - text: • createColumnBetweenFilterWithParameters(columnPath, lessParamValue, greaterParamValue, paramDataType)
                - text: Создает новый BETWEEN фильтр для проверки вхождения значения колонки в диапазон фильтра, экземпляр класса «BPMSoft.BetweenFilter».
                - text: Возвращает созданный фильтр.
            - paragraph
            - paragraph [ref=e138] [cursor=pointer]: Таблица 9 — Описание параметров метода «createColumnBetweenFilterWithParameters»
            - list [ref=e139]:
              - listitem [ref=e140]:
                - text: • createColumnFilterWithParameter(comparisonType, columnPath, paramValue, paramDataType);
                - text: Создает новый COMPARE фильтр для проверки совпадения значения колонки со значением фильтра, экземпляр класса «BPMSoft.CompareFilter».
                - text: Возвращает созданный фильтр.
            - paragraph [ref=e141] [cursor=pointer]: Таблица 10 — Описание параметров метода «createColumnFilterWithParameter»
            - text: • • • • • • • • • • • • • • • •
