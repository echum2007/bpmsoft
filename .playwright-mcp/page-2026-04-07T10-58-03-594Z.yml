          - generic [ref=e104]:
            - paragraph [ref=e105]: Для работы с данными в front-end части BPMSoft используется высокоуровневый класс EntitySchemaQuery. Он необходим для получения информации из таблиц базы данных путем создания запросов, с указанием различного перечня колонок, связей, фильтров и сортировки.
            - paragraph [ref=e106]: "У класса есть две важные особенности:"
            - list [ref=e107]:
              - listitem [ref=e108]: • При выполнении запроса учитываются права пользователя, под которым он осуществляется, что предотвращает возможность получения недоступной ему информации;
              - listitem [ref=e109]: • Класс позволяет кэшировать часто выполняемые запросы. Благодаря данной возможности можно увеличить производительность, исключая необходимость обращаться к базе данных каждый раз, когда вызывается регулярный запрос.
            - paragraph [ref=e110]: "Получение данных через класс осуществляется посредством следующих действий:"
            - list [ref=e111]:
              - listitem [ref=e112]: Инициализация экземпляра класса с указанием корневой схемы.
              - listitem [ref=e113]: Добавление в экземпляр необходимых колонок.
              - listitem [ref=e114]: Инициализация экземпляров фильтров.
              - listitem [ref=e115]: Добавление фильтров в экземпляр класса.
              - listitem [ref=e116]: Получение данных.
            - heading "Формирование путей к колонкам" [level=2] [ref=e117]:
              - text: Формирование путей к колонкам
              - img [ref=e119] [cursor=pointer]
            - paragraph [ref=e121]: Самой важной частью работы запросов класса EntitySchemaQuery является корневая схема. Она представляет собой таблицу базы данных. На ее основе добавляются колонки в запрос, включая колонки присоединяемых таблицы. Без правильного указания пути до колонки она не будет отражаться в результате выполнения запроса. Например, для получения данных колонки «ФИО» из базового раздела «Контакты» (Contact), необходимо добавить в экземпляр класса колонку с ее кодом «Name». В результирующем SQL-запросе корневая схема указывается после FROM как источник данных.
            - generic [ref=e122]:
              - generic [ref=e123]:
                - generic [ref=e125]: Пример добавления колонок в запрос
                - list [ref=e128]:
                  - listitem [ref=e129]: // Создаем экземпляр EntitySchemaQuery.
                  - listitem [ref=e130]: // Создание экземпляра EntitySchemaQuery с корневой схемой "Contact".
                  - listitem [ref=e131]: "var esqQuery = this.Ext.create(\"BPMSoft.EntitySchemaQuery\", { rootSchemaName: \"Contact\" });"
                  - listitem [ref=e132]: // Добавление колонок в запрос
                  - listitem [ref=e133]: esqQuery.addColumn("Name");
                  - listitem [ref=e134]: esqQuery.addColumn("Phone");
              - generic "Копировать код" [ref=e136] [cursor=pointer]
            - generic [ref=e137]:
              - generic [ref=e138]:
                - generic [ref=e140]: Итоговый SQL-запрос
                - list [ref=e143]:
                  - listitem [ref=e144]: SELECT [Contact].[Name],[Contact].[Phone]
                  - listitem [ref=e145]: FROM [Contact]
              - generic "Копировать код" [ref=e147] [cursor=pointer]
            - generic [ref=e148]: В случае, когда в запросе нет колонок, результат запроса вернет только уникальный идентификатор полученных записей.
            - paragraph [ref=e149]: В качестве корневой схемы можно указать любую объектную схему (EntitySchema), то есть любой объект из конфигурации. Это может быть объект, связанный с текущей страницей (например, Contact или Account), объект детали для получения данных из детали или любой пользовательский объект.
            - heading "Формирование путей к колонкам по прямым связям" [level=2] [ref=e150]:
              - text: Формирование путей к колонкам по прямым связям
              - img [ref=e152] [cursor=pointer]
            - paragraph [ref=e154]: Получение данных из колонок схем по прямым связям осуществляется посредством создания колонки в запросе. В ней указывается код справочной колонки корневой схемы и код колонки из схемы, на которую ссылается справочная колонка. Между ними находится разделитель в виде точки. Также необходимо указать псевдоним создаваемой колонки запроса.
            - paragraph [ref=e155]: "Шаблон: КодСправочнойКолонки.КодКолонкиСхемыИзСправочнойКолонки."
            - paragraph [ref=e156]: Например, необходимо получить информацию о типе контакта в запросе к таблице раздела «Контакты». В таком случае кодом корневой схемы будет «Contact», код справочной колонки «Тип контакта» — «Type», для колонок, содержащих уникальный идентификатор, в BPMSoft используется код «Id», для названия — «Name».
            - paragraph [ref=e157]: "Таким образом для получения названия типа контакта путь будет: Type.Name, для уникального идентификатора: Type.Id, в качестве псевдонима можно указывать любое значение, главное, чтобы оно не совпадало с кодами других колонок и псевдонимов."
            - paragraph [ref=e158]: Рисунок 1 — Схема с прямой связью
            - paragraph [ref=e159]:
              - img "Рисунок 1 — Схема с прямой связью" [ref=e160]
            - generic [ref=e161]: Если необходимо получить название или уникальный идентификатор записи, которым заполнена справочная колонка, не нужно присоединять к запросу схему, на которую она ссылается, так как это может значительно увеличить время выполнения запроса. Получить эти данные можно просто создав колонку с указанием кода в запросе.
            - heading "Формирование путей к колонкам по обратным связям" [level=2] [ref=e162]:
              - text: Формирование путей к колонкам по обратным связям
              - img [ref=e164] [cursor=pointer]
            - paragraph [ref=e166]: Получение данных из колонок по обратным связям осуществляется посредством создания колонок в запросе. В них указывается код присоединяемой схемы, код ее колонки для связи и код колонки связи из корневой схемы в квадратных скобках, через разделитель в виде двоеточия. После квадратных скобок через точку необходимо указать код колонки присоединяемой схемы. Также, как и при прямой связи, необходимо указать псевдоним колонки.
            - paragraph [ref=e167]:
              - text: "Шаблон:"
              - generic [ref=e168]:
                - text: "[КодПрисоединяемойСхемы:КодКолонкиСвязиПрисоединяемойСхемы:"
                - text: КодКолонкиСвязиКорневойСхемы].КодКолонкиПрисоединяемойСхемы
            - paragraph [ref=e169]: Например, для получения данных колонки «ФИО» контакта, создавшего «Контрагента» (Account), при выполнении запроса к «Контрагентам», необходимо указать в фигурных скобках код схемы раздела «Контакты» — «Contact», через двоеточие код его колонки для связи с «Контрагентом» — «Id» и также, через двоеточие, код колонки «Контакта» — «CreatedBy». После чего, через точку, указать код колонки «ФИО» — «Name».
            - paragraph [ref=e170]: "В результате для получения данных, путь к колонке будет следующим: [Contact:Id:CreatedBy].Name. Также, как и с прямой связью, псевдоним колонки может быть любым."
            - paragraph [ref=e171]: Рисунок 2 — Схема с обратной связью
            - paragraph [ref=e172]:
              - img "Рисунок 2 — Схема с обратной связью" [ref=e173]
            - generic [ref=e174]: Если не указывать псевдоним для колонки присоединяемой схемы, то в результате запроса не будет данных по нему, несмотря на то что оно будет находиться в перечне колонок. Данное правило работает для обоих видов связей.
            - heading "Добавление колонок в запрос" [level=2] [ref=e175]:
              - text: Добавление колонок в запрос
              - img [ref=e177] [cursor=pointer]
            - paragraph [ref=e179]: "Все колонки, добавляемые в экземпляр запроса EntitySchemaQuery представляют собой экземпляры класса BPMSoft.EntityQueryColumn. У этого класса есть четыре основные характеристики:"
            - list [ref=e180]:
              - listitem [ref=e181]: • Заголовок;
              - listitem [ref=e182]: • Псевдоним;
              - listitem [ref=e183]: • Признаки использования;
              - listitem [ref=e184]: • Порядок и позиция сортировки.
            - paragraph [ref=e185]: Добавление колонок в запрос в основном осуществляется через метод addColumn(column, columnAlias) класса EntitySchemaQuery. Первый аргумент метода служит для указания пути к колонке, второй для указания псевдонима колонки и не всегда является обязательным. Данный метод возвращает экземпляр класса EntityQueryColumn и добавляет его в список колонок запроса.
            - paragraph [ref=e186]:
              - text: "Помимо метода addColumn(column, columnAlias) в классе EntitySchemaQuery есть и другие методы, создающие и добавляющие различные колонки в его экземпляр, подробнее про описанный здесь и другие методы, можно прочитать в статье:"
              - link "Класс EntitySchemaQuery" [ref=e187] [cursor=pointer]:
                - /url: /baza-znaniy/dannye/klass-entityschemaquery/
            - heading "Создание фильтров запроса" [level=2] [ref=e188]:
              - text: Создание фильтров запроса
              - img [ref=e190] [cursor=pointer]
            - paragraph [ref=e192]: Фильтры — перечень условий, по которым формируется результат запроса, в терминах SQL фильтр представляет собой отдельный предикат (условие) оператора WHERE. При создании запросов рекомендуется использовать фильтры, чтобы не извлекать ненужные данные и не грузить этим приложение.
            - paragraph [ref=e193]:
              - text: "Создать простой фильтр можно при помощи метода createFilter(comparisonType, leftColumnPath, rightColumnPath), где comparisonType — тип операции сравнения, leftColumnPath — путь к проверяемой колонке относительно корневой схемы и rightColumnPath — путь к колонке-фильтру относительно корневой схемы. Метод возвращает объект фильтр класса CompareFilter. Помимо этого метода в классе EntitySchemaQuery присутствуют и другие методы, создающие различные фильтры, ознакомиться с которыми можно в статье:"
              - link "Класс EntitySchemaQuery" [ref=e194] [cursor=pointer]:
                - /url: /baza-znaniy/dannye/klass-entityschemaquery/
            - paragraph [ref=e195]: У класса EntitySchemaQuery есть свойство filters, необходимое для хранения коллекции класса BPMSoft.FilterGroup фильтров запроса.
            - paragraph [ref=e196]: "Добавление фильтра в запрос осуществляется в два действия:"
            - list [ref=e197]:
              - listitem [ref=e198]: • Создайте фильтры запроса в соответствии с необходимыми требованиями используя методы класса EntitySchemaQuery;
              - listitem [ref=e199]: • Используя метод add(filterName, filter) либо метод addItem(filter) добавьте все созданные фильтры в коллекцию фильтров.
            - paragraph [ref=e200]: По умолчанию все фильтры, добавленные в свойство filters, объединяются логическим оператором «И» (AND), однако это можно изменить, поменяв свойство logicalOperation коллекции filters класса BPMSoft.FilterGroup значением «ИЛИ» (OR) перечисления значений логических операций BPMSoft.core.enums.LogicalOperatorType.
            - paragraph [ref=e201]: Также в свойство filters можно добавлять другие экземпляры класса BPMSoft.FilterGroup и менять в них логические операции, что позволяет создавать многоуровневые сложные фильтры.
            - paragraph [ref=e202]: Во всех фильтрах и коллекциях фильтров есть свойство isEnabled принимающее значение true (участвует) или false (не участвует), которое позволяет устанавливать необходимо ли учитывать значения фильтра при поиске записей для построения результата выполнения запроса.
            - paragraph [ref=e203]: Формирование путей к колонкам в фильтрах EntitySchemaQuery осуществляется в соответствии с общими правилами формирования путей к колонкам относительно корневой схемы.
            - heading "Получить результат запроса" [level=2] [ref=e204]:
              - text: Получить результат запроса
              - img [ref=e206] [cursor=pointer]
            - paragraph [ref=e208]: "Чтобы получить результат запроса, необходимо вызвать один из нескольких его методов, передав в них метод обработчик для работы с результатом в качестве аргумента. Все из них получают одну или набор строк с данными колонок, указанных в запросе, представляющие собой сущности BPMSoft. Список методов, выполняющих запрос:"
            - list [ref=e209]:
              - listitem [ref=e210]: • getEntity(entityId, callback, scope). Данный метод получает одну единственную строку по первичному ключу, указанному в аргументе entityId;
              - listitem [ref=e211]: • getEntityCollection(callback, scope). Данный метод по указанным фильтрам получает одну или набор строк в виде коллекции;
              - listitem [ref=e212]: • execute(callback, scope). Данный метод выполняет запрос в соответствии с его параметрами.
            - paragraph [ref=e213]: "Каждый из методов имеет два ключевых аргумента: callback и scope, первый нужен для последующей обработки данных, второй необходим для привязки к методу обработчику контекста доступного через ключевое слово «this», при котором были вызваны методы, осуществляющие запрос. Все методы ничего не возвращают, а передают результат выполнения запроса в аргумент метода — функцию callback."
            - paragraph [ref=e214]:
              - text: "Ознакомиться с каждым методом детальнее можно в статье:"
              - link "Класс EntitySchemaQuery" [ref=e215] [cursor=pointer]:
                - /url: /baza-znaniy/dannye/klass-entityschemaquery/
